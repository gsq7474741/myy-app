# This workflow will deploy the built h5 app to Alibaba Cloud OSS
# It only runs when triggered by the build workflow after a successful build

name: Deploy h5 to Alibaba Cloud OSS

on:
  repository_dispatch:
    types: [deploy-h5]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag ref to deploy'
        required: true
        default: 'develop'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: aly-deploy-test
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.client_payload.ref || github.event.inputs.ref }}
    
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest
        run_install: false

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    # 构建项目（因为工作流间无法共享artifacts，所以需要重新构建）
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Build project
      run: pnpm run build:h5
    
    # 安装 tsx 运行时依赖
    - name: Install tsx
      run: pnpm install tsx @types/node ali-oss @types/ali-oss

    # 上传到阿里云 OSS
    - name: Upload to aly OSS
      env:
        ALIBABA_CLOUD_ACCESS_KEY_ID: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}
        ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
        OSS_BUCKET: ${{ vars.OSS_BUCKET }}
        OSS_REGION: ${{ vars.OSS_REGION }}
        OSS_PATH: ${{ vars.OSS_PATH }}
      run: npx tsx upload.ts