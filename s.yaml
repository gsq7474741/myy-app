edition: 3.0.0
name: myy-app
access: 'default'
vars:
  region: 'cn-hongkong'
  functionName: myy-app-${env(DOMAIN_PREFIX)}
  ossBucket: ${env(OSS_BUCKET, 'your-bucket-name')}
  ossRegion: ${env(OSS_REGION, 'oss-cn-hongkong')}
  ossPath: ${env(OSS_PATH, 'myy-app')}
resources:
  h5-build-deploy:
    component: fc3
    actions:
      pre-deploy:
        # Install dependencies and build h5 version
        - run: export PATH=/usr/local/versions/node/v20.8.1/bin:$PATH && npm install
          path: ./
        - run: export PATH=/usr/local/versions/node/v20.8.1/bin:$PATH && npm run build:h5
          path: ./
        # Install ali-oss dependency for Node.js OSS upload
        - run: export PATH=/usr/local/versions/node/v20.8.1/bin:$PATH && npm install ali-oss --no-save
          path: ./
        # Upload to OSS using Node.js script
        - run: |
            export PATH=/usr/local/versions/node/v20.8.1/bin:$PATH && node -e "
            const OSS = require('ali-oss');
            const fs = require('fs');
            const path = require('path');
            
            // OSS configuration
            const accessKeyId = process.env.ALIBABA_CLOUD_ACCESS_KEY_ID;
            const accessKeySecret = process.env.ALIBABA_CLOUD_ACCESS_KEY_SECRET;
            const bucketName = '${vars.ossBucket}';
            const region = '${vars.ossRegion}';
            const ossPath = '${vars.ossPath}';
            
            if (!accessKeyId || !accessKeySecret) {
              console.error('Missing Alibaba Cloud credentials. Please set ALIBABA_CLOUD_ACCESS_KEY_ID and ALIBABA_CLOUD_ACCESS_KEY_SECRET environment variables.');
              process.exit(1);
            }
            
            // Initialize OSS client
            const client = new OSS({
              region: region,
              accessKeyId: accessKeyId,
              accessKeySecret: accessKeySecret,
              bucket: bucketName,
              authorizationV4: true,
            });
            
            // Function to recursively get all files in a directory
            const getAllFiles = (dirPath, arrayOfFiles = []) => {
              const files = fs.readdirSync(dirPath);
              
              files.forEach(file => {
                const filePath = path.join(dirPath, file);
                if (fs.statSync(filePath).isDirectory()) {
                  arrayOfFiles = getAllFiles(filePath, arrayOfFiles);
                } else {
                  arrayOfFiles.push(filePath);
                }
              });
              
              return arrayOfFiles;
            };
            
            // Upload all files from dist directory
            const uploadFiles = async () => {
              try {
                const sourceDir = './dist';
                const allFiles = getAllFiles(sourceDir);
                
                for (const filePath of allFiles) {
                  // Calculate relative path for OSS
                  const relativePath = path.relative(sourceDir, filePath);
                  // Combine with OSS path
                  const ossKey = path.posix.join(ossPath, relativePath.split(path.sep).join(path.posix.sep));
                  
                  console.log(`Uploading ${filePath} to oss://${bucketName}/${ossKey}`);
                  
                  // Upload file to OSS using file stream
                  const fileStream = fs.createReadStream(filePath);
                  const result = await client.put(ossKey, fileStream);
                  console.log(`Uploaded successfully: ${result.url}`);
                }
                
                console.log('All files uploaded successfully!');
              } catch (error) {
                console.error('Error uploading files:', error);
                process.exit(1);
              }
            };
            
            uploadFiles();
            "
          path: ./